<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON-NEXUS: QUANTUM GRID</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap');

        :root {
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff003c;
            --neon-purple: #b026ff;
            --bg-dark: #050508;
            --grid-line: rgba(0, 240, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 1000;
            pointer-events: none;
            opacity: 0.6;
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .glitch-active { animation: glitch 0.2s linear infinite; }

        @keyframes cameraShake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-5px, 5px) rotate(-1deg); }
            50% { transform: translate(5px, -5px) rotate(1deg); }
            75% { transform: translate(-5px, 2px) rotate(0deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .shake { animation: cameraShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        #fx-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #ui-layer {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            background: rgba(5, 5, 8, 0.85);
            padding: 30px;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            border-radius: 4px;
            backdrop-filter: blur(10px);
            transform: rotateX(5deg);
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 5px 0;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 2px 0 var(--neon-magenta), -2px 0 var(--neon-cyan);
        }

        .subtitle {
            font-family: 'Share Tech Mono', monospace;
            color: var(--neon-purple);
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
            font-size: 2rem;
            margin-bottom: 15px;
            font-family: 'Share Tech Mono', monospace;
        }

        .score-p1 { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan); }
        .score-p2 { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); }

        .timer-container {
            width: 100%;
            height: 4px;
            background: #222;
            margin-bottom: 30px;
            position: relative;
        }

        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: width 0.1s linear;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5);
        }

        .cell {
            width: 110px;
            height: 110px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 240, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 5rem;
            line-height: 1;
            cursor: crosshair;
            transition: all 0.2s ease;
            position: relative;
        }

        .cell:hover {
            background: rgba(0, 240, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: inset 0 0 15px var(--neon-cyan);
        }

        .cell.x { color: var(--neon-cyan); text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
        .cell.o { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta); }

        @keyframes pulse-fade {
            0%, 100% { opacity: 1; transform: scale(1); filter: hue-rotate(0deg); }
            50% { opacity: 0.3; transform: scale(0.85); filter: hue-rotate(90deg); }
        }
        .unstable { animation: pulse-fade 1s ease-in-out infinite; }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #overlay h2 {
            font-size: 4rem;
            margin: 0 0 10px 0;
            text-align: center;
            color: var(--neon-purple);
            text-shadow: 0 0 20px var(--neon-purple);
        }

        #overlay p {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            max-width: 600px;
        }

        .menu-options {
            display: flex;
            gap: 20px;
        }

        button {
            background: rgba(0, 240, 255, 0.05);
            color: var(--neon-cyan);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 15px 30px;
            border: 2px solid var(--neon-cyan);
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 40px var(--neon-cyan);
            transform: scale(1.05);
        }

        button.magenta-btn {
            color: var(--neon-magenta);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.2), inset 0 0 10px rgba(255, 0, 60, 0.1);
            background: rgba(255, 0, 60, 0.05);
        }

        button.magenta-btn:hover {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 40px var(--neon-magenta);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>

    <div id="ui-layer">
        <header style="text-align: center;">
            <h1>NEON-NEXUS</h1>
            <div class="subtitle">QUANTUM GRID PROTOCOL</div>
        </header>

        <div class="stats-bar">
            <div class="score-p1">P1 [X]: <span id="score-x">0</span></div>
            <div id="turn-indicator" style="color: var(--neon-cyan);">UPLINK: X</div>
            <div class="score-p2"><span id="p2-label">P2 [O]</span>: <span id="score-o">0</span></div>
        </div>

        <div class="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div class="board" id="board">
            <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
        </div>
    </div>

    <div id="overlay">
        <h2 id="overlay-msg">SYSTEM STANDBY</h2>
        <p><strong>QUANTUM RULE:</strong> Max 3 active nodes per player. 4th node collapses your oldest node.</p>
        <div class="menu-options">
            <button id="btn-pvp">MULTIPLAYER (LOCAL)</button>
            <button id="btn-ai" class="magenta-btn">VS. AI (HARDCORE)</button>
        </div>
    </div>

    <script>
        /** AUDIO SYNTH ENGINE **/
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSynth(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'place_x') {
                osc.type = 'square'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'place_o') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.15);
                gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'glitch') {
                osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.4, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'win') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.linearRampToValueAtTime(1200, now + 0.8);
                gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0.01, now + 1);
                osc.start(now); osc.stop(now + 1);
            }
        }

        /** AI VOICE ENGINE **/
        const synth = window.speechSynthesis;
        const voiceLines = {
            move: ["Data locked.", "Grid updated.", "Sector claimed."],
            ai_move: ["Computing vectors.", "AI override.", "Optimal path selected.", "You cannot win."],
            glitch: ["Warning. Quantum collapse.", "Memory purged."],
            timeout: ["Signal lost. Penalty applied."],
            winX: ["Player One dominates the grid.", "Cyan victory."],
            winO: ["Player Two achieves supremacy.", "Magenta victory."],
            winAI: ["Humanity obsolete.", "AI achieves supremacy.", "Calculations flawless."]
        };

        function speakText(type, specificText = null) {
            synth.cancel();
            let text = specificText || voiceLines[type][Math.floor(Math.random() * voiceLines[type].length)];
            if (text) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = 0.3; utterance.rate = 1.3; utterance.volume = 0.8;
                synth.speak(utterance);
            }
        }

        /** PARTICLE FX ENGINE **/
        const canvas = document.getElementById('fx-canvas'); const ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                const angle = Math.random() * Math.PI * 2; const speed = Math.random() * 20 + 5;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.life = 1.0; this.decay = Math.random() * 0.05 + 0.02; this.size = Math.random() * 4 + 2;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += 0.8; this.life -= this.decay; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size); ctx.shadowBlur = 0;
            }
        }

        function triggerExplosion(x, y, color) { for (let i = 0; i < 50; i++) particles.push(new Particle(x, y, color)); }
        function animateFX() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateFX);
        }
        animateFX();

        /** GAME LOGIC **/
        let board = Array(9).fill(null);
        let currentPlayer = 'X';
        let isGameActive = false;
        let gameMode = 'pvp'; // 'pvp' or 'ai'
        let scores = { X: 0, O: 0 };
        let moveHistory = { X: [], O: [] };
        
        const WIN_COMBOS = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];

        let turnTimeLeft = 100; 
        const TURN_DURATION_MS = 6000; 
        let lastFrameTime = 0;
        let timerAnimId;

        const cells = document.querySelectorAll('.cell');
        const timerBar = document.getElementById('timer-bar');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');
        const turnIndicator = document.getElementById('turn-indicator');
        const uiLayer = document.getElementById('ui-layer');

        function triggerShake(heavy = false) {
            uiLayer.classList.remove('shake', 'glitch-active');
            void uiLayer.offsetWidth;
            uiLayer.classList.add(heavy ? 'glitch-active' : 'shake');
            if(heavy) setTimeout(() => uiLayer.classList.remove('glitch-active'), 400);
        }

        function updateTimer(timestamp) {
            if (!isGameActive) return;
            if (!lastFrameTime) lastFrameTime = timestamp;
            const deltaTime = timestamp - lastFrameTime;
            lastFrameTime = timestamp;

            turnTimeLeft -= (deltaTime / TURN_DURATION_MS) * 100;
            timerBar.style.width = `${Math.max(0, turnTimeLeft)}%`;
            timerBar.style.backgroundColor = turnTimeLeft > 50 ? 'var(--neon-cyan)' : turnTimeLeft > 25 ? 'var(--neon-purple)' : 'var(--neon-magenta)';

            if (turnTimeLeft <= 0) {
                playSynth('glitch'); speakText('timeout'); triggerShake(true);
                switchPlayer(); resetTimer();
            }
            timerAnimId = requestAnimationFrame(updateTimer);
        }

        function resetTimer() {
            turnTimeLeft = 100; lastFrameTime = performance.now();
        }

        function updateUnstableVisuals() {
            cells.forEach(c => c.classList.remove('unstable'));
            if (moveHistory[currentPlayer].length === 3) cells[moveHistory[currentPlayer][0]].classList.add('unstable');
        }

        function handleMove(index) {
            if (moveHistory[currentPlayer].length === 3) {
                const oldestIndex = moveHistory[currentPlayer].shift();
                board[oldestIndex] = null;
                cells[oldestIndex].innerText = '';
                cells[oldestIndex].className = 'cell';
                
                playSynth('glitch');
                triggerShake(true);
                const rect = cells[oldestIndex].getBoundingClientRect();
                triggerExplosion(rect.left + rect.width/2, rect.top + rect.height/2, '#fff');
            } else {
                if(currentPlayer === 'X' || gameMode === 'pvp') speakText('move');
                else speakText('ai_move');
            }

            board[index] = currentPlayer;
            moveHistory[currentPlayer].push(index);
            cells[index].innerText = currentPlayer;
            cells[index].classList.add(currentPlayer.toLowerCase());

            playSynth(currentPlayer === 'X' ? 'place_x' : 'place_o');
            triggerShake(false);
            const rect = cells[index].getBoundingClientRect();
            const color = currentPlayer === 'X' ? '#00f0ff' : '#ff003c';
            triggerExplosion(rect.left + rect.width/2, rect.top + rect.height/2, color);

            if (WIN_COMBOS.some(c => c.every(i => board[i] === currentPlayer))) {
                const winMsg = gameMode === 'ai' && currentPlayer === 'O' ? "SYSTEM OVERRIDE: AI WINS" : `${currentPlayer} CONTROLS THE NEXUS`;
                const voiceLine = gameMode === 'ai' && currentPlayer === 'O' ? 'winAI' : (currentPlayer === 'X' ? 'winX' : 'winO');
                endGame(winMsg, currentPlayer, voiceLine);
            } else {
                switchPlayer();
                resetTimer();
                updateUnstableVisuals();
            }
        }

        function switchPlayer() {
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            turnIndicator.innerText = gameMode === 'ai' && currentPlayer === 'O' ? "UPLINK: AI COMPUTING..." : `UPLINK: ${currentPlayer}`;
            turnIndicator.style.color = currentPlayer === 'X' ? 'var(--neon-cyan)' : 'var(--neon-magenta)';

            if (gameMode === 'ai' && currentPlayer === 'O') {
                isGameActive = false; // pause inputs
                setTimeout(() => {
                    const aiMoveIndex = getBestAIMove();
                    isGameActive = true;
                    handleMove(aiMoveIndex);
                }, 800); // AI thinking delay
            }
        }

        /** HARDCORE AI (Minimax with Quantum Logic) **/
        function getBestAIMove() {
            let bestScore = -Infinity;
            let move = -1;
            let emptySpots = board.map((val, idx) => val === null ? idx : null).filter(val => val !== null);
            
            for (let i of emptySpots) {
                let tempBoard = [...board];
                let hX = [...moveHistory.X];
                let hO = [...moveHistory.O];
                
                if (hO.length === 3) { tempBoard[hO[0]] = null; hO.shift(); }
                tempBoard[i] = 'O'; hO.push(i);
                
                let score = minimax(tempBoard, 5, false, hX, hO, -Infinity, Infinity);
                if (score > bestScore) { bestScore = score; move = i; }
            }
            return move !== -1 ? move : emptySpots[0];
        }

        function minimax(tempBoard, depth, isMax, hX, hO, alpha, beta) {
            let oWins = WIN_COMBOS.some(c => c.every(i => tempBoard[i] === 'O'));
            let xWins = WIN_COMBOS.some(c => c.every(i => tempBoard[i] === 'X'));
            
            if (oWins) return 10 + depth;
            if (xWins) return -10 - depth;
            if (depth === 0) return 0; // Evaluate heuristics here if needed

            let emptySpots = tempBoard.map((val, idx) => val === null ? idx : null).filter(val => val !== null);
            if (emptySpots.length === 0) return 0;

            if (isMax) {
                let best = -Infinity;
                for (let i of emptySpots) {
                    let nextB = [...tempBoard]; let nHO = [...hO];
                    if (nHO.length === 3) { nextB[nHO[0]] = null; nHO.shift(); }
                    nextB[i] = 'O'; nHO.push(i);
                    best = Math.max(best, minimax(nextB, depth - 1, false, hX, nHO, alpha, beta));
                    alpha = Math.max(alpha, best);
                    if (beta <= alpha) break;
                }
                return best;
            } else {
                let best = Infinity;
                for (let i of emptySpots) {
                    let nextB = [...tempBoard]; let nHX = [...hX];
                    if (nHX.length === 3) { nextB[nHX[0]] = null; nHX.shift(); }
                    nextB[i] = 'X'; nHX.push(i);
                    best = Math.min(best, minimax(nextB, depth - 1, true, nHX, hO, alpha, beta));
                    beta = Math.min(beta, best);
                    if (beta <= alpha) break;
                }
                return best;
            }
        }

        function endGame(message, winner, voiceKey) {
            isGameActive = false; cancelAnimationFrame(timerAnimId);
            scores[winner]++;
            document.getElementById(`score-${winner.toLowerCase()}`).innerText = scores[winner];
            playSynth('win'); speakText(voiceKey);
            
            setTimeout(() => {
                overlayMsg.innerText = message;
                overlayMsg.style.color = winner === 'X' ? 'var(--neon-cyan)' : 'var(--neon-magenta)';
                document.querySelector('.menu-options').classList.remove('hidden');
                overlay.classList.remove('hidden');
            }, 1000);
        }

        function initGame(mode) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            gameMode = mode;
            document.getElementById('p2-label').innerText = gameMode === 'ai' ? 'AI [O]' : 'P2 [O]';
            speakText('move', mode === 'ai' ? "AI initialized. Prepare to lose." : "Multiplayer initialized.");

            board.fill(null); moveHistory = { X: [], O: [] };
            currentPlayer = 'X'; isGameActive = true;
            turnIndicator.innerText = `UPLINK: X`; turnIndicator.style.color = 'var(--neon-cyan)';
            cells.forEach(cell => { cell.innerText = ''; cell.className = 'cell'; });
            overlay.classList.add('hidden');
            resetTimer(); timerAnimId = requestAnimationFrame(updateTimer);
        }

        cells.forEach(cell => cell.addEventListener('click', (e) => {
            if (!isGameActive || (gameMode === 'ai' && currentPlayer === 'O')) return;
            const index = parseInt(e.target.getAttribute('data-index'));
            if (board[index] === null) handleMove(index);
        }));

        document.getElementById('btn-pvp').addEventListener('click', () => initGame('pvp'));
        document.getElementById('btn-ai').addEventListener('click', () => initGame('ai'));

    </script>
</body>
</html>
